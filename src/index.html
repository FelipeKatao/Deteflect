<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styels.css">
    <title>DeteFlect Framework</title>
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Dataflect</h2>
            <h2>Login</h2>
            <div class="form-group">
                <label for="username">User:</label>
                <input type="text" id="username" name="username" placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha">
            </div>
            <button id="loginBtn" class="login-button">Enter</button>
        </div>
    </div>

    <div class='page'>
        <nav class="nav"> <ul><li class="bold">Deteflect</li> <li class='content'>Documentation</li> </ul></nav>
        <div id='msg_input' class='msgs'>
            <div id="welcome">
                <h1>Welcome to Deteflect Framework</h1>
                <h3>How can I help you?</h3>
            </div>
        </div>
        <div class='input_sender'>
            <input type="text" name="input" id="input">
            <button type="submit" id="send">Send</button>
        </div>
    </div>
    <footer>Created by Felipe Katao 2026, all rights reserved </footer>
    <script src="./js/Sender_Get_msg.js"></script>
    <script src="./js/modal.js"></script>
</body>
</html>
