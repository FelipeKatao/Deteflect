<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styels.css">
    <title>DeteFlect Framework</title>
</head>
<body>
    <div id="app">
        <!-- Login Modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <h2>Dataflect</h2>
                <h2>Login</h2>
                <div class="form-group">
                    <label for="username">User:</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Digite seu usuário"
                        autocomplete="username"
                    >
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                    >
                </div>
                <button id="loginBtn" class="login-button">Enter</button>
            </div>
        </div>

        <!-- Botão de toggle do menu (fora do sidebar) -->
        <button
            id="toggleSidebarBtn"
            class="toggle-menu-btn"
            title="Recolher/Expandir Menu"
        >◀</button>

        <!-- Menu Lateral -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Chats</h3>
                <button id="newChatBtn" class="new-chat-btn" title="Novo Chat">+</button>
            </div>
            <div id="chatList" class="chat-list"></div>
        </div>

        <div class="page">
            <nav class="nav">
                <ul>
                    <li class="bold">Deteflect</li>
                    <li class="content" id="activeChatName">Documentation</li>
                </ul>
            </nav>

            <div id="messagesViewport" class="msgs"></div>

            <div class="input_sender">
                <input
                    type="text"
                    id="composerInput"
                    placeholder="Digite sua mensagem..."
                    autocomplete="off"
                >
                <button type="button" id="sendBtn">Send</button>
            </div>
        </div>

        <footer>Created by Felipe Katao 2026, all rights reserved</footer>
    </div>

    <script src="./js/apiClient.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
