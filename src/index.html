<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DeteFlect AI</title>

    <link rel="stylesheet" hreF="css/styels.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

    <!-- BACKGROUND -->

    <div class="background">

        <div class="sphere sphere1"></div>
        <div class="sphere sphere2"></div>

    </div>

    <!-- LOGIN -->

    <div id="loginModal" class="modal">

        <div class="modal-card">

            <div class="logo-area">
                <h1>Dete<span>Flect</span></h1>
                <p>Framework inteligente para NLP e IA</p>
            </div>

            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button id="loginBtn" class="login-btn">
                Entrar
            </button>

        </div>

    </div>

    <!-- APP -->

    <main class="app">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="sidebar-top">

                <div class="logo">
                    Dete<span>Flect</span>
                </div>

                <button id="newChatBtn" class="new-chat">
               <h2 id="chatTitle">Nova conversa</h2>
                </button>

            </div>

         <div id="chatHistory" class="chat-history"></div>

            <div class="sidebar-footer">
                <span>Felipe Katao © 2026</span>
            </div>

        </aside>

        <!-- CHAT -->

        <section class="chat-container">

            <!-- HEADER -->

            <header class="chat-header">

                <div>
                    <h2>DeteFlect AI</h2>
                    <p id="chat_title">Assistente inteligente com NLP</p>
                </div>

                <div id="status" class="status online"> ● Online </div>

            </header>

            <!-- CHAT -->

            <div id="messages" class="messages">

                <div class="welcome">

                    <h1>
                        Como posso ajudar você hoje?
                    </h1>

                    <p>
                        Faça perguntas, envie comandos ou interaja
                        com o sistema inteligente.
                    </p>

                </div>

            </div>

            <!-- INPUT -->

            <div class="input-area">

                <div class="input-wrapper">

                    <input
                        type="text"
                        id="input"
                        placeholder="Digite sua mensagem..."
                    >

                    <button id="send">
                        Enviar
                    </button>

                </div>

            </div>

        </section>

    </main>

    <script src="./js/app.js"></script>

</body>
</html>
